<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="style.css" />
        <title>CME | CONTACTS</title>
    </head>
    <body>
        <nav class="navbar">
            <a href="home.html" class="logo">CME</a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li class="active"><a href="#">Contact</a></li>
            </ul>
        </nav>

        <section id="contact">
            <div class="contact container">
                <h1 class="section-title">Contact Me Here</h1>
                <p class="contact-intro">
                    Place any messages and inquiries here below at the form!
                </p>

                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Please Enter your full name here"
                        required
                        />
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Please Enter your Email Address here"
                        required
                        />
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea
                        id="message"
                        name="message"
                        rows="5"
                        placeholder="WRITE YOUR MESSAGE HERE"
                        required
                        ></textarea>
                    </div>

                    <button type="submit" class="btn-iv">Submit</button>
                </form>
            </div>
        </section>
    </body>
</html>
